<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Una carta para ti ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffdde1,#ee9ca7);
overflow:hidden;
}

.card{

width:90%;
max-width:700px;

background:white;

padding:35px;

border-radius:20px;

box-shadow:0 10px 30px rgba(0,0,0,.2);

animation:fade .8s;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}

#message{

font-size:19px;

line-height:1.8;

white-space:pre-line;

min-height:250px;

}

button{

margin-top:25px;

padding:14px 25px;

border:none;

border-radius:30px;

background:#ff5c8d;

color:white;

font-size:17px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#ff2f74;

transform:scale(1.05);

}

#choices{

display:none;

gap:15px;

justify-content:center;

flex-wrap:wrap;

}

</style>

</head>

<body>

<div class="card">

<div id="message">

Pulsa el botón para comenzar...

</div>

<div id="start">

<button onclick="start()">

💌 Abrir carta

</button>

</div>

<div id="choices">

<button onclick="endLove()">

❤️ Seguir leyendo

</button>

<button onclick="endFriend()">

🌙 Prefiero una amistad

</button>

</div>

</div>

<script>

const msg=document.getElementById("message");

const startDiv=document.getElementById("start");

const choices=document.getElementById("choices");

function write(text,speed=25,callback){

msg.innerHTML="";

let i=0;

let timer=setInterval(()=>{

msg.innerHTML+=text.charAt(i);

i++;

if(i>=text.length){

clearInterval(timer);

if(callback)callback();

}

},speed);

}

function start(){

startDiv.style.display="none";

write(

"Si estás leyendo esto es porque quería decirte algo que llevaba tiempo guardando.\n\nHay personas que llegan sin hacer ruido... pero terminan ocupando un lugar muy especial.\n\nNo sé si esta carta cambiará algo, pero sí sé que no quería seguir callando lo que siento.\n\nAntes de terminar... quiero que elijas una opción.",

20,

()=>{

choices.style.display="flex";

});

}
function endLove(){

choices.style.display="none";

write(

"❤️ Gracias por seguir leyendo.\n\nNo escribí esta carta esperando una respuesta inmediata.\n\nSolo quería que supieras que cada conversación contigo, cada sonrisa y cada momento compartido han significado mucho para mí.\n\nQuizá esta carta no cambie nada entre nosotros...\n\nO quizá sea el inicio de algo muy bonito.\n\nSea cual sea el camino, gracias por existir y por hacer mis días un poco mejores.\n\nSi algún día decides caminar a mi lado, prometo hacerlo paso a paso, sin prisas, disfrutando cada momento.\n\nGracias por llegar hasta aquí. ❤️",

20,

()=>{

msg.innerHTML+=`

<br><br><center>

<button onclick="location.reload()">

🔄 Leer otra vez

</button>

</center>

`;

});

}

function endFriend(){

choices.style.display="none";

write(

"🌙 Gracias por ser sincera.\n\nNo importa cuál haya sido tu elección.\n\nLo más importante para mí era que conocieras estas palabras.\n\nHay personas que dejan una huella muy bonita en nuestra vida, y tú eres una de ellas.\n\nEspero que esta carta al menos haya conseguido sacarte una sonrisa.\n\nTe deseo toda la felicidad del mundo y espero que sigamos compartiendo buenos momentos. ✨",

20,

()=>{

msg.innerHTML+=`

<br><br><center>

<button onclick="location.reload()">

🔄 Volver al inicio

</button>

</center>

`;

});

}

</script>

</body>

</html>
